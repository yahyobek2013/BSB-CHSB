<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | e-Maktab PRO</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #6366f1;
            --secondary: #06b6d4;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --error: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- DINAMIK FON --- */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: floatOrb 25s infinite alternate;
        }

        @keyframes floatOrb {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(30%, 30%) scale(1.3); }
        }

        /* --- REGISTER CONTAINER --- */
        .register-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: containerIn 0.8s ease-out;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 35px;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* --- FORMA ELEMENTLARI --- */
        form p {
            margin-bottom: 20px;
            position: relative;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 5px;
        }

        form input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
        }

        form input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            transform: scale(1.01);
        }

        /* --- TUGMA --- */
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 25px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* --- YORDAMCHI MATNLAR --- */
        .helptext {
            font-size: 0.75rem;
            color: #64748b;
            display: block;
            margin-top: 8px;
            line-height: 1.4;
            padding: 0 5px;
        }

        .errorlist {
            color: var(--error);
            list-style: none;
            padding: 10px;
            font-size: 0.85rem;
            margin-top: 10px;
            background: rgba(244, 63, 94, 0.1);
            border-radius: 10px;
            border-left: 3px solid var(--error);
        }

        /* --- LOGIN LINK --- */
        .login-link {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        .login-link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: var(--secondary);
            transition: width 0.3s;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .register-container {
                margin: 15px;
                padding: 40px 25px;
            }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Animatsion Orqa Fon -->
    <div class="bg-glow">
        <div class="orb" style="background: var(--primary); top: -10%; right: -10%;"></div>
        <div class="orb" style="background: var(--secondary); bottom: -10%; left: -10%; animation-delay: -7s;"></div>
    </div>

    <div class="register-container">
        <h2>Ro'yxatdan o'tish</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <p>
                    <label for="{{ field.id_for_label }}">
                        <i class="fas fa-chevron-right" style="font-size: 0.7rem; color: var(--primary);"></i> 
                        {{ field.label }}
                    </label>
                    
                    {{ field }}
                    
                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text|safe }}</span>
                    {% endif %}
                    
                    {% if field.errors %}
                        <ul class="errorlist">
                            {% for error in field.errors %}
                                <li><i class="fas fa-exclamation-triangle"></i> {{ error }}</li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                </p>
            {% endfor %}
            
            <button type="submit">
                Hisob yaratish <i class="fas fa-user-plus" style="margin-left: 10px;"></i>
            </button>
        </form>

        <div class="login-link">
            Akkauntingiz bormi? <a href="{% url 'login' %}">Kirish</a>
        </div>
    </div>

    <script>
        // Sichqoncha harakatiga qarab orqa fonni biroz qimirlatish (interaktivlik uchun)
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = (e.clientX / window.innerWidth) * 40;
            const y = (e.clientY / window.innerHeight) * 40;
            
            orbs.forEach((orb) => {
                orb.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
